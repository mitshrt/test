<!DOCTYPE html>
 <html lang="ja"> 
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農業インターン事前アンケート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e0e0f;
    --surface: #181819;
    --border: #000000;
    --accent: #c8f94d;
    --accent-dim: #8aaa30;
    --text: #ffffff;
    --muted: #6b6b72;
    --danger: #ff5e5e;
    --success: #60f0a8;
    --card-bg: #141415;
  }
   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
 /* -- ページ本体のデザイン -- */
 /*-- ①フォント --*/
    font-family: 'Noto Serif JP', sans-serif;
 /*-- ②背景画像設定 --*/
    background-image: url('IMG_8544.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
 /*-- ③テキスト色 --*/
    color: var(--text);
 /*-- ④スマホ崩れ防止 --*/
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
 }

 /* ── 背景のおしゃれさ ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(200,240,96,.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(96,240,168,.04) 0%, transparent 70%);
    pointer-events: none;
 }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.015) 1px, transparent 3px),
      linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 3px);
    background-size: 48px 48px;
    pointer-events: none;
 }

 /* ── clss 設定 ── */
  .wrapper {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
 }
  .header {
    margin-bottom: 2.5rem;
    border-left: 3px solid var(--accent);
    padding-left: 1.2rem;
 }
  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    color: var(--accent);
    letter-spacing: .2em;
    text-transform: uppercase;
    margin-bottom: .5rem;
 }
  .header h1 {
    font-size: 1.7rem;
    font-weight: 600;
    letter-spacing: .04em;
    line-height: 1.3;
 }

 /* ── PROGRESS ── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── CARD ── */
   .card {
    background: rgba(210, 202, 202, 0.131);
    backdrop-filter: blur(20px);
    border: 3px solid var(--border);
    border-radius: 16px;
    padding: 2rem 2rem 1.8rem;
    position: relative;
    transition: border-color .3s;
  }
  .card:focus-within { border-color: #3a3a40; }

  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.4rem;
  }
  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 1.0rem;
    color: var(--success);
    letter-spacing: .15em;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: .4; transform: scale(.7); }
  }

  .q-text {
    font-family: sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.65;
    margin-bottom: 1.6rem;
    letter-spacing: .02em;
    color: #0e0e0f;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: .7rem; }

  .option {
    display: flex;
    align-items: center;
    gap: .9rem;
    padding: .85rem 1.1rem;
    background: rgba(0, 0, 0, 0);
    backdrop-filter: blur(100px);
    border:2px solid rgb(0, 0, 0);
    border-radius: 10px;
    cursor: pointer;
    transition: background .18s, border-color .18s, transform .12s;
    user-select: none;
  }
  .option:hover { background: var(--accent); border-color: rgb(255, 255, 255); }
  .option.selected { background: rgba(200,240,96,.1); border-color: var(--accent); }
  .option:active { transform: scale(.99); }

  .radio-box {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .18s;
  }
  .option.selected .radio-box { border-color: var(--accent); }
  .radio-inner {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    transform: scale(0);
    transition: transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .option.selected .radio-inner { transform: scale(1); }

  .option-text {
    font-family: sans-serif;
    font-size: .95rem;
    line-height: 1.4;
    letter-spacing: .02em;
    font-weight: 600;
    color: rgb(0, 0, 0);

  }
  /* Textarea */
  textarea {
    width: 100%;
    min-height: 110px;
    background: rgba(0, 0, 0, 100.0);
    backdrop-filter: blur(2px);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: .95rem;
    padding: .9rem 1rem;
    resize: vertical;
    outline: none;
    transition: border-color .18s;
    line-height: 1.6;
  }
  textarea:focus { border-color: rgba(200,240,96,.4); }

  /* Range */
 .range-wrap {
  padding: .8rem 1rem;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(50px);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  }
  .range-labels { display: flex; justify-content: space-between; margin-top: .6rem; }
  .range-labels span { font-family: 'DM Mono', monospace; font-size: .7rem; color: #ffffff; }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(200,240,96,.2);
    transition: box-shadow .18s;
  }
  input[type=range]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 6px rgba(200,240,96,.2); }
  .range-value {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 1.4rem;
    color: var(--accent);
    margin-top: .8rem;
  }

  /* ── NAVIGATION ── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.6rem;
    gap: 1rem;
  }
  .btn {
    font-family:sans-serif;
    font-size: .8rem;
    letter-spacing: .08em;
    padding: .65rem 1.4rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background .18s, border-color .18s, color .18s, transform .1s;
    background: transparent;
    color:#ffffff;
    font-weight: 400;
  }
  .btn:hover { color:#ffffff; border-color: #000000; background: rgb(103, 103, 103); }
   #backBtn:hover {
    color: rgb(0, 0, 0);
    background: rgb(255, 255, 255);
    cursor: pointer;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0f;
    font-weight: 400;
  }
  .btn-primary:hover { background: #d8f87a; border-color: #d8f87a; color: #0e0e0f; }
  .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .skip-btn { font-size: .72rem; color: var(--muted); text-decoration: underline; background: none; border: none; cursor: pointer; }
  .skip-btn:hover { color: var(--text); }

  /* ── RESULT PANEL ── */
  .result-panel {
    display: none;
    background: rgba(20, 20, 21, 0.6);
    backdrop-filter: blur(30px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }
  .result-panel.show { display: block; }

  .result-title {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    color: var(--success);
    letter-spacing: .2em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .result-heading {
    font-size: 1.4rem;
    font-weight: 300;
    margin-bottom: 1.6rem;
  }

  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .85rem;
    margin-bottom: 1.6rem;
  }
  .result-table th {
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: .68rem;
    letter-spacing: .1em;
    color: var(--muted);
    padding: .5rem .8rem;
    border-bottom: 1px solid var(--border);
  }
  .result-table td {
    padding: .65rem .8rem;
    border-bottom: 1px solid rgba(255,255,255,.04);
    vertical-align: top;
  }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table .q-col { color: var(--muted); font-family: 'DM Mono', monospace; font-size: .72rem; }
  .result-table .ans { color: var(--text); }


  .restart-btn {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    letter-spacing: .08em;
    padding: .6rem 1.2rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: color .18s, border-color .18s;
    margin-top: .4rem;
  }
  .restart-btn:hover { color: var(--text); border-color: #4a4a52; }

  /* Animation */
  .card, .result-panel {
    animation: fadeUp .35s cubic-bezier(.4,0,.2,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slide-in {
    animation: fadeUp .3s cubic-bezier(.4,0,.2,1) both;
  }


</style>
</head>

<body>
<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="header-label">SURVEY — 2026</div>
    <h1>農インに関するアンケート</h1>
  </div>

  <!-- PROGRESS -->
  <div class="progress-row">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 5</div>
  </div>

  <!-- QUESTION CARD -->
  <div class="card" id="questionCard">
    <div class="q-meta">
      <div class="q-num" id="qNum">QUESTION 01</div>
      <div class="q-timer">
        <div class="timer-dot"></div>
      </div>
    </div>
    <div class="q-text" id="qText"></div>
    <div id="qBody"></div>

    <div class="nav">
      <button class="btn" id="backBtn" onclick="goBack()">← 戻る</button>
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="skip-btn" id="skipBtn" onclick="skipQuestion()">スキップ</button>
        <button class="btn btn-primary" id="nextBtn" onclick="goNext()">次へ →</button>
      </div>
    </div>
  </div>

  <!-- RESULT PANEL -->
  <div class="result-panel" id="resultPanel">
    <div class="result-title" id="resultStatus">SUBMITTED</div>
    <div class="result-heading" id="resultHeading">ご回答ありがとうございました</div>
    <div id="dropoffNotice"></div>
    <table class="result-table" id="resultTable">
      <thead>
        <tr>
          <th>Q</th>
          <th>回答</th>
          <th>ステータス</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
    <button class="restart-btn" onclick="editAnswers()">✎ 回答を編集する</button>
    <button class="restart-btn" onclick="restart()">↺ 最初からやり直す</button>
  </div>

</div>

<script>
// ─── QUESTION DEFINITIONS ────────────────────────────────────────────────────
const QUESTIONS = [
  {
    id: 1,
    text: '参加されたきっかけはなんですか？',
    type: 'radio',
    options: ['Instagramの広告を見て', 'Webで検索して', '家族や知人からの紹介', '大学からの案内'],
    required: true
  },
  {
    id: 2,
    text: '本インターンの満足度を教えてください。（0〜10）',
    type: 'range',
    min: 0, max: 10, step: 1, initial: 5,
    labelMin: '満足していない(0)', labelMax: '満足 (10)',
    required: true
  },
  {
    id: 3,
    text: '本インターンを友人などに勧める可能性はどのくらいですか？（0〜10）',
    type: 'range',
    min: 0, max: 10, step: 1, initial: 5,
    labelMin: '全く勧めない (0)', labelMax: '強く勧める (10)',
    required: true
  },
  {
    id: 4,
    text: '良かったと感じたプログラムは何でしたか？（複数選択可）',
    type: 'checkbox',
    options: ['農作業', '自己分析'],
    required: false
  },
  {
    id: 5,
    text: '本インターンの改善点や追加してほしいプログラムがあれば、自由にご記入ください。',
    type: 'text',
    placeholder: 'ご意見・ご要望をお聞かせください…',
    required: false
  }
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentIndex = 0;
let answers = {};          // { questionId: value }
let timings  = {};         // { questionId: seconds }
let statuses = {};         // { questionId: 'answered' | 'skipped' | 'pending' }
let timerInterval = null;
let questionStartTime = null;
let submitted = false;

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  QUESTIONS.forEach(q => { statuses[q.id] = 'pending'; timings[q.id] = 0; });
  renderQuestion();
};

window.addEventListener('beforeunload', e => {
  if (!submitted) {
    saveDropoffData();
  }
});


// ─── TIMER ────────────────────────────────────────────────────────────────────
function startTimer(qId) {
  clearInterval(timerInterval);
  questionStartTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - questionStartTime) / 1000);
    timings[qId] = (timings[qId] || 0); // 内部で保持するだけ
  }, 1000);
}



function stopTimer(qId) {
  clearInterval(timerInterval);
  if (questionStartTime) {
    const elapsed = Math.floor((Date.now() - questionStartTime) / 1000);
    timings[qId] = (timings[qId] || 0) + elapsed; // ← ここで加算
    questionStartTime = null;
  }
}


function formatSeconds(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  document.getElementById('questionCard').style.display = 'block';
  document.getElementById('resultPanel').classList.remove('show');

  document.getElementById('qNum').textContent = `QUESTION ${String(q.id).padStart(2,'0')}`;
  document.getElementById('qText').textContent = q.text;

  const body = document.getElementById('qBody');
  body.innerHTML = '';
  body.className = '';

  if (q.type === 'radio') {
    const wrap = document.createElement('div');
    wrap.className = 'options';
    q.options.forEach((opt, i) => {
      const div = document.createElement('div');
      div.className = 'option' + (answers[q.id] === opt ? ' selected' : '');
      div.innerHTML = `
        <div class="radio-box"><div class="radio-inner"></div></div>
        <span class="option-text">${opt}</span>`;
      div.onclick = () => {
        answers[q.id] = opt;
        statuses[q.id] = 'answered';
        wrap.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
        div.classList.add('selected');
      };
      wrap.appendChild(div);
    });
    body.appendChild(wrap);
  }

  else if (q.type === 'checkbox') {
    if (!answers[q.id]) answers[q.id] = [];
    const wrap = document.createElement('div');
    wrap.className = 'options';
    q.options.forEach(opt => {
      const checked = answers[q.id].includes(opt);
      const div = document.createElement('div');
      div.className = 'option' + (checked ? ' selected' : '');
      div.innerHTML = `
        <div class="radio-box" style="border-radius:4px"><div class="radio-inner" style="border-radius:2px"></div></div>
        <span class="option-text">${opt}</span>`;
      div.onclick = () => {
        const idx2 = answers[q.id].indexOf(opt);
        if (idx2 === -1) { answers[q.id].push(opt); div.classList.add('selected'); }
        else { answers[q.id].splice(idx2, 1); div.classList.remove('selected'); }
        statuses[q.id] = answers[q.id].length > 0 ? 'answered' : 'pending';
      };
      wrap.appendChild(div);
    });
    body.appendChild(wrap);
  }

  else if (q.type === 'range') {
    const val = answers[q.id] ?? q.initial;
    const wrap = document.createElement('div');
    wrap.className = 'range-wrap';
    wrap.innerHTML = `
      <input type="range" min="${q.min}" max="${q.max}" step="${q.step}" value="${val}" id="rangeInput">
      <div class="range-labels"><span>${q.labelMin}</span><span>${q.labelMax}</span></div>
      <div class="range-value" id="rangeVal">${val}</div>`;
    body.appendChild(wrap);
    const inp = wrap.querySelector('#rangeInput');
    inp.oninput = () => {
      answers[q.id] = Number(inp.value);
      statuses[q.id] = 'answered';
      wrap.querySelector('#rangeVal').textContent = inp.value;
    };
    answers[q.id] = Number(val);
    statuses[q.id] = 'answered';
  }

  else if (q.type === 'text') {
    const ta = document.createElement('textarea');
    ta.placeholder = q.placeholder || '';
    ta.value = answers[q.id] || '';
    ta.oninput = () => {
      answers[q.id] = ta.value.trim();
      statuses[q.id] = ta.value.trim() ? 'answered' : 'pending';
    };
    body.appendChild(ta);
  }

  // Nav buttons
  document.getElementById('backBtn').disabled = currentIndex === 0;
  const isLast = currentIndex === QUESTIONS.length - 1;
  document.getElementById('nextBtn').textContent = isLast ? '送信 ✓' : '次へ →';
  document.getElementById('skipBtn').style.display = q.required ? 'none' : 'inline';

  // Timer
  startTimer(q.id);

  // Slide animation
  document.getElementById('questionCard').classList.remove('slide-in');
  void document.getElementById('questionCard').offsetWidth;
  document.getElementById('questionCard').classList.add('slide-in');

  // Progress
  const answered = QUESTIONS.filter(q2 => statuses[q2.id] === 'answered').length;
  const pct = (currentIndex / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentIndex} / ${QUESTIONS.length}`;
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function goNext() {
  const q = QUESTIONS[currentIndex];
  stopTimer(q.id);

  const isLast = currentIndex === QUESTIONS.length - 1;

  if (q.required && statuses[q.id] !== 'answered') {
    shake();
    return;
  }
  if (statuses[q.id] === 'pending') statuses[q.id] = 'skipped';

  if (isLast) { submitSurvey(); return; }

  currentIndex++;
  renderQuestion();
}

function goBack() {
  const q = QUESTIONS[currentIndex];
  stopTimer(q.id);
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
}

function skipQuestion() {
  const q = QUESTIONS[currentIndex];
  stopTimer(q.id);
  statuses[q.id] = 'skipped';
  if (currentIndex < QUESTIONS.length - 1) { currentIndex++; renderQuestion(); }
  else { submitSurvey(); }
}

function shake() {
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.style.borderColor = 'rgba(255,94,94,.5)';
  card.style.transform = 'translateX(-6px)';
  setTimeout(() => { card.style.transform = 'translateX(6px)'; }, 80);
  setTimeout(() => { card.style.transform = 'translateX(-4px)'; }, 160);
  setTimeout(() => { card.style.transform = 'translateX(0)'; card.style.borderColor = ''; }, 240);
}

// ─── GOOGLE APPS SCRIPT URL ───────────────────────────────────────────────────
// ★ デプロイしたウェブアプリのURLをここに貼り付けてください
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxjL0hIoZo3LMEpim1T6AMeLgsUb7R7r_Qj5Eqi-L4YgBvaq1JVEDgpsyqQgT5oHyXy/exec';

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
function submitSurvey() {
  submitted = true;
  clearInterval(timerInterval);

  const data = buildResultData();

  // 送信中UI
  const btn = document.getElementById('nextBtn');
  btn.textContent = '送信中…';
  btn.disabled = true;

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors', // GASはno-corsで送る
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(() => {
    showResult(true, getLastAnsweredIndex());
  })
  .catch(() => {
    // 通信エラー時もローカル結果は表示し、エラーを通知
    showResult(true, getLastAnsweredIndex());
    setTimeout(() => {
      alert('⚠ スプレッドシートへの送信に失敗しました。\nJSONエクスポートでデータを保存してください。');
    }, 300);
  });
}

function saveDropoffData() {
  const q = QUESTIONS[currentIndex];
  if (questionStartTime) {
    const elapsed = Math.floor((Date.now() - questionStartTime) / 1000);
    timings[q.id] = (timings[q.id] || 0) + elapsed;
  }
  const data = buildResultData();
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });

  // まずsendBeaconを試みる
  const beaconSent = navigator.sendBeacon(GAS_URL, blob);

  // sendBeaconが失敗したらfetchで送る
  if (!beaconSent) {
    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
      keepalive: true  
    }).catch(() => {});
  }
}


function getLastAnsweredIndex() {
  let last = -1;
  QUESTIONS.forEach((q, i) => {
    if (statuses[q.id] === 'answered' || statuses[q.id] === 'skipped') last = i;
  });
  return last;
}

function buildResultData() {
  return {
submittedAt: new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' }),
    submitted,
    lastReachedQuestion: currentIndex + 1,
    questions: QUESTIONS.map(q => ({
      id: q.id,
      text: q.text,
      answer: answers[q.id] ?? null,
      timeSpentSeconds: timings[q.id] || 0,
      status: statuses[q.id]
    }))
  };
}

function showResult(isComplete, lastIdx) {
  document.getElementById('questionCard').style.display = 'none';
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');

  const answeredCount = QUESTIONS.filter(q => statuses[q.id] === 'answered').length;
  const totalTime = Object.values(timings).reduce((a, b) => a + b, 0);

  if (isComplete) {
    document.getElementById('resultStatus').textContent = '✓ SUBMITTED';
    document.getElementById('resultStatus').style.color = 'var(--success)';
    document.getElementById('resultHeading').textContent =
      `ご回答ありがとうございました！`;
    document.getElementById('dropoffNotice').innerHTML = '';
  } else {
    document.getElementById('resultStatus').textContent = '⚠ INCOMPLETE';
    document.getElementById('resultStatus').style.color = 'var(--danger)';
    document.getElementById('resultHeading').textContent = 'アンケートが未送信のまま終了されました';
    const reached = currentIndex + 1;
    document.getElementById('dropoffNotice').innerHTML = `
      <div class="dropoff-notice">
        <strong>離脱検知：</strong> 第 <strong>${reached} 問</strong> まで進んでいましたが、アンケートは送信されませんでした。<br>
        回答済み：${answeredCount} 問  / スキップ：${QUESTIONS.filter(q=>statuses[q.id]==='skipped').length} 問  / 未回答：${QUESTIONS.filter(q=>statuses[q.id]==='pending').length} 問<br>
        合計滞在時間：${formatSeconds(totalTime)}
      </div>`;
  }

  const tbody = document.getElementById('resultBody');
  tbody.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const tr = document.createElement('tr');
    const answerVal = answers[q.id];
    let answerStr = '—';
    if (Array.isArray(answerVal)) answerStr = answerVal.join('、') || '—';
    else if (answerVal !== undefined && answerVal !== null && answerVal !== '') answerStr = String(answerVal);

    const statusMap = { answered: '✓ 回答済', skipped: '- スキップ', pending: '✗ 未回答' };
    const statusColor = { answered: 'var(--success)', skipped: 'var(--muted)', pending: 'var(--danger)' };
    const st = statuses[q.id] || 'pending';

    tr.innerHTML = `
      <td class="q-col">Q${q.id}</td>
      <td class="ans">${answerStr}</td>
      <td style="color:${statusColor[st]};font-size:.78rem;font-family:'DM Mono',monospace">${statusMap[st]}</td>`;
    tbody.appendChild(tr);
  });

  // update progress to 100%
  if (isComplete) {
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('progressLabel').textContent = `${QUESTIONS.length} / ${QUESTIONS.length}`;
  }
}

function exportJSON() {
  const data = buildResultData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `survey_${Date.now()}.json`;
  a.click();
}

function editAnswers() {
  submitted = false;
  currentIndex = 0;
  clearInterval(timerInterval);
  document.getElementById('nextBtn').disabled = false;  // ← これを追加
  document.getElementById('nextBtn').textContent = '次へ →'; // ← これも追加
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  renderQuestion();
}


function restart() {
  currentIndex = 0;
  answers = {}; timings = {}; statuses = {}; submitted = false;
  clearInterval(timerInterval);
  QUESTIONS.forEach(q => { statuses[q.id] = 'pending'; timings[q.id] = 0; });
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  renderQuestion();
}
</script>
</body>
